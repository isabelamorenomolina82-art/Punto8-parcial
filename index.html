<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="ISABELA MORENO MOLINA">
  <meta name="keywords" content="frutas, fruitkha, tienda online, bootstrap, responsive, examen 8">
  <meta name="description" content="Página web estilo Fruitkha basada en la referencia del examen 8.">
  <title>Fruitkha</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="hero">
    <div class="container hero__container">
      <section class="hero__card">
        <header class="hero__header">
          <div class="container-fluid">
            <div class="row align-items-center hero__header-row">
              <div class="col-lg-3 col-md-12 text-center text-lg-start">
                <a href="#" class="hero__brand">
                  <span class="hero__brand-icon">
                    <i class="bi bi-basket2-fill"></i>
                  </span>
                  <span class="hero__brand-text">
                    Fruitkha
                    <small>Fresh Fruits Online</small>
                  </span>
                </a>
              </div>

              <div class="col-lg-7 col-md-12">
                <nav class="hero__nav">
                  <ul class="hero__menu">
                    <li><a href="#" class="hero__link hero__link--active">Home</a></li>
                    <li><a href="#" class="hero__link">About</a></li>
                    <li><a href="#" class="hero__link">Pages</a></li>
                    <li><a href="#" class="hero__link">News</a></li>
                    <li><a href="#" class="hero__link">Contact</a></li>
                    <li><a href="#" class="hero__link">Shop</a></li>
                  </ul>
                </nav>
              </div>

              <div class="col-lg-2 col-md-12 text-center text-lg-end">
                <div class="hero__actions">
                  <a href="#" class="hero__icon"><i class="bi bi-cart-fill"></i></a>
                  <a href="#" class="hero__icon"><i class="bi bi-search"></i></a>
                </div>
              </div>
            </div>
          </div>
        </header>

        <section class="hero__content">
          <div class="hero__content-box">
            <p class="hero__subtitle">FRESH &amp; ORGANIC</p>
            <h1 class="hero__title">Delicious Seasonal Fruits</h1>

            <div class="hero__buttons">
              <a href="#" class="hero__button hero__button--primary">Fruit Collection</a>
              <a href="#" class="hero__button hero__button--secondary">Contact Us</a>
            </div>
          </div>
        </section>
      </section>
    </div>
  </main>
</body>
</html>
